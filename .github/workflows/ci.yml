name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    name: Tests (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest

      - name: Run tests
        run: python -m pytest -q

  quality:
    name: Static quality checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest

      - name: Syntax compile checks
        run: |
          python - <<'PY'
          import compileall
          ok = True
          ok = compileall.compile_dir("clogem", force=True, quiet=1) and ok
          ok = compileall.compile_dir("tests", force=True, quiet=1) and ok
          if not ok:
              raise SystemExit(1)
          print("compileall checks passed")
          PY

      - name: Test collection smoke check
        run: python -m pytest --collect-only -q

  package:
    name: Package build checks
    runs-on: ubuntu-latest
    needs: [test, quality]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Twine metadata check
        run: python -m twine check dist/*
